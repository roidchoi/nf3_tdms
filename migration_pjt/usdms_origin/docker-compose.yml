services:
  # 1. TimescaleDB (PostgreSQL 16 based)
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: usdms_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: usdms_db
    volumes:
      - ./usdms_data:/var/lib/postgresql/data
      - ./backend/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - usdms_net
    restart: always
    command: ["postgres", "-c", "max_locks_per_transaction=16384", "-c", "maintenance_work_mem=1GB"]

  # 2. FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: backend.Dockerfile
    container_name: usdms_backend
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_DB=usdms_db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - SEC_USER_AGENT=${SEC_USER_AGENT}
    depends_on:
      - timescaledb
    networks:
      - usdms_net
    ports:
      - "${BACKEND_PORT}:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

networks:
  usdms_net:
    driver: bridge
